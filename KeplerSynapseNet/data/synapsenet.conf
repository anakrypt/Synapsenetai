port=8333
rpcport=8334
datadir=~/.synapsenet
debug=0
maxpeers=125
maxoutbound=8
privacy=0
modelpath=~/.synapsenet/models
defaultmodel=llama-3.2-7b.gguf
modelaccess=private
modelprice=0
modelslots=3
validatorstake=100
mining=1
security=high
confirmations=3
autoloadmodel=1
otp=1
validationthreads=4
participateindoe=1
knowledgemaxage=30
replicashards=3
# SIMULATION MODE: Development/Testing Configuration
# Set simulation.enabled=1 to use fake wallet, peers, and network for testing
# Set to 0 for production mode - requires real blockchain integration
simulation.enabled=0
simulation.use_fake_wallet=0
simulation.use_fake_peers=0
simulation.use_fake_network=0

# Tor runtime routing (NAAN / web / privacy)
# agent.tor.mode=auto     -> use external Tor if reachable, else allow SynapseNet-managed Tor
# agent.tor.mode=external -> never start managed Tor; require an operator-run Tor SOCKS (example: 9150)
# agent.tor.mode=managed  -> allow SynapseNet-managed Tor startup on configured socks port
# agent.tor.mode=auto
# agent.tor.required=1
# agent.tor.socks_host=127.0.0.1
# agent.tor.socks_port=9050
# tor.socks.host=127.0.0.1
# tor.socks.port=9050
# tor.control.port=9051
